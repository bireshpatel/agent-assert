# CI: typecheck + smoke test via local Ollama (only LLM_PROVIDER + LLM_MODEL; no API key).
# Uses a small local model by default — fine on GitHub-hosted runners without GPU.
#
# Fork PRs: the test job is skipped (secrets are not available to workflows from forks).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  test:
    needs: typecheck
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LLM_PROVIDER: ollama
      # Small local model (runs on CPU; no Ollama Cloud / API key). Change here or set env in the smoke step only.
      LLM_MODEL: llama3.2:1b
      OLLAMA_BASE_URL: http://127.0.0.1:11434/v1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and wait for API
        run: |
          set -e
          sudo systemctl stop ollama 2>/dev/null || true
          nohup ollama serve > /tmp/ollama-serve.log 2>&1 &
          echo "Waiting for http://127.0.0.1:11434 ..."
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
              echo "Ollama is ready (after ${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "--- ollama serve log ---"
          cat /tmp/ollama-serve.log || true
          exit 1

      - name: Pull Ollama model
        timeout-minutes: 30
        run: ollama pull "$LLM_MODEL"

      - name: Smoke test (single LLM case)
        run: npm run test:smoke

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
